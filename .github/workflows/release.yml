name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  metadata:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      create_tag: ${{ steps.meta.outputs.create_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Calculate release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            CREATE_TAG="false"
          else
            VERSION="$(node -p "require('./package.json').version")"
            TAG_NAME="v${VERSION}-build.${GITHUB_RUN_NUMBER}"
            CREATE_TAG="true"
          fi

          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "release_name=MCDF Marketplace ${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "create_tag=${CREATE_TAG}" >> "${GITHUB_OUTPUT}"

  build-tauri:
    name: Build Tauri (${{ matrix.name }})
    needs: metadata
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            platform: ubuntu-22.04
            args: ''
            target: ''
          - name: windows-x86_64
            platform: windows-latest
            args: ''
            target: ''
          - name: macos-aarch64
            platform: macos-latest
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
          - name: macos-x86_64
            platform: macos-latest
            args: '--target x86_64-apple-darwin'
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build ${{ matrix.args }}

      - name: Upload release bundles
        uses: actions/upload-artifact@v4
        with:
          name: mcdf-marketplace-${{ matrix.name }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/**/*
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*

  publish-release:
    name: Publish GitHub release
    needs:
      - metadata
      - build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release tag for main build
        if: needs.metadata.outputs.create_tag == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.metadata.outputs.tag_name }}" "${GITHUB_SHA}"
          git push origin "${{ needs.metadata.outputs.tag_name }}"

      - name: Download built bundles
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag_name }}
          name: ${{ needs.metadata.outputs.release_name }}
          draft: false
          prerelease: ${{ needs.metadata.outputs.create_tag == 'true' }}
          generate_release_notes: true
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
